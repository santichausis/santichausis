name: Update merged PRs

on:
  schedule:
    - cron: '0 9 * * 1'   # lunes 09:00 UTC (~06:00 ART)
  workflow_dispatch:        # permite dispararlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate PR section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_readme_prs.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh merged PRs in README"
            git push
          else
            echo "Sin cambios."
          fi
